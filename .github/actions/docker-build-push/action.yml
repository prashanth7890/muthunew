name: Docker Build Push

description: Build Tag Push Docker Image

inputs:
  dockerhub-username:
    required: true
  dockerhub-token:
    required: true

runs:
  using: composite

  steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}

    - name: Build Docker Image
      shell: bash
      run: |
        docker build -t ${{ inputs.dockerhub-username }}/muthunew:latest .

    - name: Push Docker Image
      shell: bash
      run: |
        docker push ${{ inputs.dockerhub-username }}/muthunew:latest
